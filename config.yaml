# Default benchmark configuration for llmr bench
# Usage: llmr bench              (auto-loads config.yaml)
#        llmr bench -c custom.yml (uses custom config)

server:
  endpoint: http://127.0.0.1:8080/v1/chat/completions
  health_endpoint: /health
  props_endpoint: /props

model:
  name: GGUF model name here

performance:
  prompts:
    - "Explain quantum computing in simple terms."
    - "What is the capital of France?"
  max_tokens: 256
  temperature: 0.0
  top_p: 1.0
  seed: 42
  warmup_runs: 1
  measured_runs: 3
  stream: false

quality:
  enabled: false
  tasks:
    - gsm8k
  num_fewshot: 5